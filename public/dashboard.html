<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · theurlshortner</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/" aria-label="theurlshortner home">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="brand-name">theurlshortner</span>
    </a>
    <div class="nav-links" id="nav-links"><!-- filled by JS --></div>
  </nav>

  <main class="card card-wide">
    <h1>Your links</h1>

    <form id="create-form" class="dash-create" autocomplete="off">
      <input id="url-input" type="url" placeholder="https://example.com/long/link" required />
      <input id="code-input" type="text" placeholder="custom-code (optional)"
             pattern="[A-Za-z0-9\-]{4,30}" title="4–30 letters, numbers or dashes" />
      <button type="submit" id="create-btn">Create</button>
    </form>

    <p id="error" class="error" hidden></p>

    <div class="table-wrap">
      <table class="links-table">
        <thead>
          <tr>
            <th>Short URL</th>
            <th>Destination</th>
            <th>Clicks</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="links-body">
          <tr><td colspan="5" class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="/dashboard.js"></script>
</body>
</html>
