<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · Shortly</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/">🔗 Shortly</a>
    <div class="nav-links"><a href="/">Home</a></div>
  </nav>

  <main class="card">
    <div class="tabs">
      <button type="button" class="tab active" data-tab="login">Log in</button>
      <button type="button" class="tab" data-tab="signup">Sign up</button>
    </div>

    <form id="login-form" class="auth-form" autocomplete="on">
      <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email" />
      <input id="login-password" type="password" placeholder="Password" required autocomplete="current-password" />
      <button type="submit">Log in</button>
    </form>

    <form id="signup-form" class="auth-form" autocomplete="on" hidden>
      <input id="signup-email" type="email" placeholder="you@example.com" required autocomplete="email" />
      <input id="signup-password" type="password" placeholder="Password (min 8 characters)" required minlength="8" autocomplete="new-password" />
      <button type="submit">Create account</button>
    </form>

    <p id="auth-error" class="error" hidden></p>
  </main>

  <script src="/login.js"></script>
</body>
</html>
