<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in or Sign up · TheURLShortner</title>
  <meta name="description" content="Log in or create a free TheURLShortner account to manage your short links, set custom codes, and track clicks." />
  <link rel="canonical" href="https://theurlshortner.com/login" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="TheURLShortner" />
  <meta property="og:title" content="Sign in or Sign up" />
  <meta property="og:description" content="Log in or create a free TheURLShortner account to manage your short links, set custom codes, and track clicks." />
  <meta property="og:url" content="https://theurlshortner.com/login" />
  <meta property="og:image" content="https://theurlshortner.com/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sign in or Sign up | TheURLShortner" />
  <meta name="twitter:description" content="Log in or create a free TheURLShortner account to manage your short links, set custom codes, and track clicks." />
  <meta name="twitter:image" content="https://theurlshortner.com/og-image.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/" aria-label="TheURLShortner home">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="brand-name">TheURLShortner</span>
    </a>
    <div class="nav-links"><a href="/">Home</a></div>
  </nav>

  <main class="card auth-card">
    <div class="auth-head">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </div>
      <h1 id="auth-title">Welcome back</h1>
      <p class="subtitle" id="auth-sub">Sign in to manage your links.</p>
    </div>

    <div class="tabs">
      <button type="button" class="tab active" data-tab="login">Log in</button>
      <button type="button" class="tab" data-tab="signup">Sign up</button>
    </div>

    <!-- LOGIN -->
    <form id="login-form" class="auth-form" autocomplete="on" novalidate>
      <label class="field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <input id="login-email" type="email" placeholder="Email address" required autocomplete="email" />
      </label>
      <label class="field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="login-password" type="password" placeholder="Password" required autocomplete="current-password" />
      </label>
      <button type="submit">Log in</button>
    </form>

    <!-- SIGNUP -->
    <form id="signup-form" class="auth-form" autocomplete="on" novalidate hidden>
      <label class="field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <input id="signup-email" type="email" placeholder="Email address" required autocomplete="email" />
      </label>
      <label class="field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="signup-password" type="password" placeholder="Password (min 8 characters)" required minlength="8" autocomplete="new-password" />
      </label>
      <label class="field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="m9 16 2 2 4-4"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="signup-confirm" type="password" placeholder="Confirm password" required autocomplete="new-password" />
      </label>

      <div class="robot-check" id="robot-check">
        <input type="checkbox" id="signup-human" />
        <label for="signup-human">I'm not a robot</label>
        <svg class="robot-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
      </div>

      <label class="check">
        <input type="checkbox" id="signup-terms" />
        <span>I agree to the <a href="/guides">Terms</a> &amp; <a href="/guides">Privacy Policy</a>.</span>
      </label>

      <button type="submit">Create account</button>
    </form>

    <p id="auth-error" class="error" hidden></p>
  </main>

  <script src="/login.js"></script>
</body>
</html>
